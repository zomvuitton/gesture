<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>C.I.R.A.N.</title>
<style>
:root {
  --bg:       #111;
  --s1:       #181818;
  --s2:       #202020;
  --s3:       #282828;
  --border:   #2c2c2c;
  --t1:       #e0e0e0;
  --t2:       #999;
  --t3:       #555;
  --t4:       #333;
  --font:     system-ui, -apple-system, sans-serif;
  --mono:     'Courier New', Courier, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--font);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  -webkit-text-size-adjust: 100%;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  height: 42px;
  border-bottom: 1px solid var(--border);
  background: var(--s1);
  flex-shrink: 0;
}

.logo {
  font-size: 13px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: 0.5px;
}

.logo sub {
  font-size: 9px;
  font-weight: 400;
  color: var(--t3);
  margin-left: 6px;
  letter-spacing: 0;
  vertical-align: middle;
}

.hcontrols {
  display: flex;
  align-items: center;
  gap: 6px;
}

.hbtn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--t3);
  font-family: var(--mono);
  font-size: 10px;
  padding: 4px 9px;
  cursor: pointer;
  transition: border-color 0.1s, color 0.1s;
  letter-spacing: 0.5px;
}

.hbtn:active { background: var(--s2); }
.hbtn.on { border-color: var(--t2); color: var(--t2); }
.hbtn.listening { border-color: var(--t1); color: var(--t1); animation: blink 0.8s step-end infinite; }

@keyframes blink { 50% { opacity: 0.25; } }

.hdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--t4);
  transition: background 0.3s;
}
.hdot.on { background: var(--t2); }

#fps {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--t4);
  min-width: 44px;
  text-align: right;
}

/* ── Main layout ── */
main {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: 1fr 300px;
  overflow: hidden;
}

@media (orientation: portrait) {
  main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  .log-panel { border-left: none !important; border-top: 1px solid var(--border); }
}

/* ── Camera ── */
.cam {
  position: relative;
  background: #000;
  overflow: hidden;
}

video {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

canvas {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  transform: scaleX(-1);
}

.ccorner {
  position: absolute;
  width: 14px; height: 14px;
  z-index: 5; pointer-events: none;
  opacity: 0.35;
}
.ccorner.tl { top: 10px; left: 10px; border-top: 1px solid #aaa; border-left: 1px solid #aaa; }
.ccorner.tr { top: 10px; right: 10px; border-top: 1px solid #aaa; border-right: 1px solid #aaa; }
.ccorner.bl { bottom: 10px; left: 10px; border-bottom: 1px solid #aaa; border-left: 1px solid #aaa; }
.ccorner.br { bottom: 10px; right: 10px; border-bottom: 1px solid #aaa; border-right: 1px solid #aaa; }

/* Debug overlay */
#dbg {
  display: none;
  position: absolute;
  top: 10px; right: 10px;
  z-index: 10;
  background: rgba(0,0,0,0.88);
  border: 1px solid var(--s3);
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--t2);
  line-height: 1.9;
  min-width: 200px;
  pointer-events: none;
}
#dbg .dt { font-size: 9px; color: var(--t3); letter-spacing: 1px; margin-bottom: 4px; }

/* ── Log panel ── */
.log-panel {
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border);
  background: var(--s1);
  overflow: hidden;
}

.log-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  height: 32px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.log-topbar span {
  font-size: 10px;
  color: var(--t3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.log-topbar button {
  background: none; border: none;
  color: var(--t4); font-family: var(--mono);
  font-size: 10px; cursor: pointer;
}
.log-topbar button:hover { color: var(--t2); }

#log {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--s3) transparent;
}

.entry {
  padding: 3px 10px 4px;
  border-bottom: 1px solid transparent;
}

.entry-meta {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--t4);
  margin-bottom: 1px;
}

.entry-text {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.45;
  word-break: break-word;
  color: var(--t2);
}

.entry.user  .entry-text { color: var(--t1); }
.entry.ai    .entry-text { color: #888; }
.entry.action .entry-text { color: var(--t3); font-style: italic; }
.entry.sys   .entry-text { color: var(--t4); }
.entry.err   .entry-text { color: #777; }
.entry.gest  .entry-text { color: var(--t3); }

/* Input bar */
.log-input {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  border-top: 1px solid var(--border);
  padding: 6px 8px;
  gap: 5px;
}

.log-input input {
  flex: 1;
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--t1);
  font-family: var(--mono);
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
}
.log-input input::placeholder { color: var(--t4); }
.log-input input:focus { border-color: var(--t3); }

.log-input button {
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--t2);
  font-size: 14px;
  padding: 5px 10px;
  cursor: pointer;
}

/* ── Bottom panel ── */
.bottom {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 2fr 2fr 1fr 1fr;
  border-top: 1px solid var(--border);
  background: var(--s1);
  height: 48px;
}

.bitem {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 12px;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.bitem:last-child { border-right: none; }

.blabel {
  font-size: 8px;
  color: var(--t4);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.bval {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--t1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bval.dim { color: var(--t4); }

/* ── Setup screen ── */
#setup {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 100;
}

#setup h1 {
  font-size: 17px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: 1px;
}

#setup p {
  font-size: 11px;
  color: var(--t3);
  text-align: center;
  max-width: 260px;
  line-height: 1.6;
}

.fields {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 272px;
}

.fields label {
  font-size: 9px;
  color: var(--t3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.fields input {
  background: var(--s1);
  border: 1px solid var(--border);
  color: var(--t1);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px;
  outline: none;
  width: 100%;
}
.fields input:focus { border-color: var(--t3); }
.fields input::placeholder { color: var(--t4); }

#startbtn {
  width: 272px;
  padding: 10px;
  background: var(--s2);
  border: 1px solid var(--t3);
  color: var(--t1);
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
}

#statustxt {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--t3);
  min-height: 16px;
}
</style>
</head>
<body>

<header>
  <div class="logo">C.I.R.A.N.<sub>control integrated responsive ai network</sub></div>
  <div class="hcontrols">
    <span id="fps">-- fps</span>
    <button class="hbtn" id="micbtn">mic</button>
    <button class="hbtn" id="dbgbtn">dbg</button>
    <div class="hdot" id="dot"></div>
  </div>
</header>

<main>
  <div class="cam" id="cam">
    <div class="ccorner tl"></div>
    <div class="ccorner tr"></div>
    <div class="ccorner bl"></div>
    <div class="ccorner br"></div>

    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>

    <div id="dbg">
      <div class="dt">debug</div>
      <div id="d-fingers"></div>
      <div style="height:1px;background:#222;margin:3px 0"></div>
      <div id="d-ok"></div>
      <div id="d-shaka"></div>
      <div id="d-cross"></div>
      <div id="d-down"></div>
      <div id="d-snap"></div>
      <div id="d-heart"></div>
    </div>
  </div>

  <div class="log-panel">
    <div class="log-topbar">
      <span>log</span>
      <button id="clrbtn">temizle</button>
    </div>
    <div id="log"></div>
    <div class="log-input">
      <input type="text" id="txtin" placeholder="komut yaz...">
      <button id="sendbtn">→</button>
    </div>
  </div>
</main>

<div class="bottom">
  <div class="bitem"><div class="blabel">hareket</div><div class="bval dim" id="b-gest">—</div></div>
  <div class="bitem"><div class="blabel">yüz</div><div class="bval dim" id="b-face">—</div></div>
  <div class="bitem"><div class="blabel">parmak</div><div class="bval dim" id="b-fing">—</div></div>
  <div class="bitem"><div class="blabel">el</div><div class="bval dim" id="b-hand">—</div></div>
</div>

<div id="setup">
  <h1>C.I.R.A.N.</h1>
  <p>Control Integrated Responsive AI Network</p>
  <div class="fields">
    <label>Gemini API Key</label>
    <input type="password" id="gemkey" placeholder="AIza...">
    <label style="margin-top:4px">Spotify Client ID <span style="color:var(--t4)">(opsiyonel)</span></label>
    <input type="text" id="spotid" placeholder="client id">
  </div>
  <button id="startbtn">Başlat</button>
  <span id="statustxt"></span>
</div>

<script type="module">
import { GestureRecognizer, FaceLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

// ── Config ────────────────────────────────────────────────
let GEMINI_KEY = '';
let SPOTIFY_ID = '';
let spotifyToken = null;
let models = false;

// ── Vision state ──────────────────────────────────────────
let gr, fl;
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let lastT = -1, fpsH = [], lastF = 0;
let debugOn = false;
let lastGest = '', gestCool = false;

// ── Labels ────────────────────────────────────────────────
const GL = {
  None:'—', Closed_Fist:'yumruk', Open_Palm:'açık el', Pointing_Up:'yukarı',
  Thumb_Down:'başp. aşağı', Thumb_Up:'başp. yukarı', Victory:'zafer', ILoveYou:'ily',
  OK:'tamam', Shaka:'shaka', Crossed:'nazar', PointDown:'aşağı',
  FingerSnap:'snap', HeartHands:'kalp el',
};
const FL = {
  smile:'gülümseme', surprise:'şaşkın', angry:'kızgın',
  sad:'üzgün', wink:'göz kırp', neutral:'nötr',
};

// ── Logging ───────────────────────────────────────────────
function addLog(type, text, meta='') {
  const el = document.createElement('div');
  el.className = 'entry ' + type;
  const t = new Date().toLocaleTimeString('tr', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML = `<div class="entry-meta">${t}${meta?' · '+meta:''}</div><div class="entry-text">${text}</div>`;
  const log = document.getElementById('log');
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

document.getElementById('clrbtn').onclick = () => document.getElementById('log').innerHTML = '';

// ── Setup ─────────────────────────────────────────────────
document.getElementById('startbtn').addEventListener('click', async () => {
  GEMINI_KEY = document.getElementById('gemkey').value.trim();
  SPOTIFY_ID = document.getElementById('spotid').value.trim();

  if (!GEMINI_KEY) { setSt('gemini api key gerekli'); return; }

  setSt('modeller yükleniyor...');
  document.getElementById('startbtn').disabled = true;

  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
    );
    [gr, fl] = await Promise.all([
      GestureRecognizer.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task", delegate:"GPU" },
        runningMode:"VIDEO", numHands:2
      }),
      FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate:"GPU" },
        runningMode:"VIDEO", numFaces:1, outputFaceBlendshapes:true
      })
    ]);

    await startCam();
    models = true;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('dot').classList.add('on');
    addLog('sys', 'sistem hazır');
    if (SPOTIFY_ID) handleSpotifyCallback();

  } catch(e) {
    setSt('hata: ' + e.message);
    document.getElementById('startbtn').disabled = false;
  }
});

function setSt(t) { document.getElementById('statustxt').textContent = t; }

async function startCam() {
  const s = await navigator.mediaDevices.getUserMedia({
    video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} }
  });
  video.srcObject = s;
  await new Promise(r => video.onloadedmetadata = r);
  video.play();
  resizeCv();
  loop();
}

function resizeCv() {
  canvas.width  = canvas.offsetWidth  || canvas.clientWidth;
  canvas.height = canvas.offsetHeight || canvas.clientHeight;
}
window.addEventListener('resize', resizeCv);

// ── Main loop ─────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  if (!video.videoWidth || video.currentTime === lastT) return;
  lastT = video.currentTime;

  const now = performance.now();
  if (lastF) {
    fpsH.push(1000/(now-lastF));
    if (fpsH.length>10) fpsH.shift();
    document.getElementById('fps').textContent =
      Math.round(fpsH.reduce((a,b)=>a+b)/fpsH.length)+' fps';
  }
  lastF = now;

  const gRes = gr.recognizeForVideo(video, now);
  const fRes = fl.detectForVideo(video, now);

  const vw=video.videoWidth, vh=video.videoHeight;
  const cw=canvas.width, ch=canvas.height;
  const sc=Math.max(cw/vw, ch/vh);
  const dw=vw*sc, dh=vh*sc, dx=(cw-dw)/2, dy=(ch-dh)/2;

  ctx.clearRect(0,0,cw,ch);
  if (fRes.faceLandmarks?.length) drawFace(fRes.faceLandmarks[0],dw,dh,dx,dy);

  let topG='None', topC=0, hands=0, fingers=0;

  if (gRes.landmarks?.length) {
    hands = gRes.landmarks.length;
    gRes.landmarks.forEach((lm,i) => {
      drawHand(lm.map(p=>({x:p.x*dw+dx, y:p.y*dh+dy, z:p.z})));
      fingers += countFin(lm);
      let gn='None', gc=0;
      if (gRes.gestures[i]?.[0]) { gn=gRes.gestures[i][0].categoryName; gc=gRes.gestures[i][0].score; }
      const cust = customGest(lm, gRes.landmarks);
      if (cust) { gn=cust; gc=0.92; }
      if (gc>topC) { topC=gc; topG=gn; }
    });
  }

  if (topG==='MiddleFinger') { showSetup(); return; }

  const face = detectFace(fRes);
  updateBottom(topG, fingers, hands, face);
  if (debugOn) updateDbg(gRes.landmarks?.[0]||null, gRes.landmarks||[]);
  handleGestCmd(topG);
}

// ── Gesture → command ─────────────────────────────────────
const GCMDS = {
  Thumb_Up:   'müziği çal',
  Thumb_Down: 'müziği durdur',
  Victory:    'sonraki şarkı',
  Open_Palm:  'müziği duraklat',
};

function handleGestCmd(g) {
  if (g==='None' || g===lastGest || gestCool || !GCMDS[g]) return;
  gestCool = true; lastGest = g;
  setTimeout(()=>{ gestCool=false; lastGest=''; }, 2500);
  addLog('gest', `jest: ${GL[g]||g} → "${GCMDS[g]}"`);
  askAI(GCMDS[g]);
}

// ── AI (Gemini) ───────────────────────────────────────────
const SYS = `Sen C.I.R.A.N., Türkçe konuşan kişisel bir asistansın.
Kısa ve net cevap ver. Uygunsa doğrudan bir fonksiyon çağır.`;

const TOOLS = [{
  functionDeclarations: [
    {
      name: 'spotify_control',
      description: "Spotify müzik kontrolü",
      parameters: {
        type:'OBJECT',
        properties: {
          action: { type:'STRING', enum:['play','pause','next','previous','volume_up','volume_down','search_and_play'] },
          query:  { type:'STRING', description:'Çalınacak şarkı/sanatçı (search_and_play için)' }
        },
        required:['action']
      }
    },
    {
      name: 'set_reminder',
      description: "Hatırlatıcı kur",
      parameters: {
        type:'OBJECT',
        properties: {
          message: { type:'STRING' },
          minutes: { type:'NUMBER' }
        },
        required:['message','minutes']
      }
    },
    {
      name: 'web_search',
      description: "Web'de ara ve özetle",
      parameters: {
        type:'OBJECT',
        properties: { query: { type:'STRING' } },
        required:['query']
      }
    }
  ]
}];

async function askAI(text) {
  addLog('user', text, 'kullanıcı');
  if (!GEMINI_KEY) { addLog('err','api key yok'); return; }

  try {
    const r = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          system_instruction: { parts:[{text:SYS}] },
          contents: [{ role:'user', parts:[{text}] }],
          tools: TOOLS
        })
      }
    );
    const d = await r.json();
    if (d.error) { addLog('err','gemini: '+d.error.message); return; }

    for (const part of d.candidates?.[0]?.content?.parts||[]) {
      if (part.text) { addLog('ai', part.text, 'ciran'); speak(part.text); }
      if (part.functionCall) await execFn(part.functionCall.name, part.functionCall.args);
    }
  } catch(e) {
    addLog('err','bağlantı hatası: '+e.message);
  }
}

// ── Function execution ────────────────────────────────────
async function execFn(name, args) {
  addLog('action', `→ ${name}(${JSON.stringify(args)})`, 'eylem');
  if (name==='spotify_control') await doSpotify(args.action, args.query);
  else if (name==='set_reminder') doReminder(args.message, args.minutes);
  else if (name==='web_search') await doSearch(args.query);
}

// Spotify
async function doSpotify(action, query) {
  if (!spotifyToken) {
    if (SPOTIFY_ID) {
      addLog('err','spotify bağlı değil — <a href="#" id="sp-link" style="color:var(--t2)">bağlan</a>');
      setTimeout(()=>{
        document.getElementById('sp-link')?.addEventListener('click', e=>{
          e.preventDefault(); startSpotifyAuth();
        });
      }, 100);
    } else { addLog('err','spotify client id girilmedi'); }
    return;
  }
  const h = {'Authorization':'Bearer '+spotifyToken,'Content-Type':'application/json'};
  try {
    if (action==='play')       { await fetch('https://api.spotify.com/v1/me/player/play',{method:'PUT',headers:h}); addLog('action','spotify: çalınıyor'); }
    else if (action==='pause') { await fetch('https://api.spotify.com/v1/me/player/pause',{method:'PUT',headers:h}); addLog('action','spotify: duraklatıldı'); }
    else if (action==='next')  { await fetch('https://api.spotify.com/v1/me/player/next',{method:'POST',headers:h}); addLog('action','spotify: sonraki'); }
    else if (action==='previous') { await fetch('https://api.spotify.com/v1/me/player/previous',{method:'POST',headers:h}); addLog('action','spotify: önceki'); }
    else if (action==='volume_up' || action==='volume_down') {
      const pr = await fetch('https://api.spotify.com/v1/me/player',{headers:h});
      const pd = await pr.json();
      const v = pd.device?.volume_percent ?? 50;
      const nv = action==='volume_up' ? Math.min(100,v+20) : Math.max(0,v-20);
      await fetch(`https://api.spotify.com/v1/me/player/volume?volume_percent=${nv}`,{method:'PUT',headers:h});
      addLog('action',`spotify: ses ${nv}%`);
    }
    else if (action==='search_and_play' && query) {
      const sr = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=1`,{headers:h});
      const sd = await sr.json();
      const t = sd.tracks?.items?.[0];
      if (t) {
        await fetch('https://api.spotify.com/v1/me/player/play',{method:'PUT',headers:h,body:JSON.stringify({uris:[t.uri]})});
        addLog('action',`spotify: "${t.name}" — ${t.artists[0].name}`);
      } else addLog('err',`"${query}" bulunamadı`);
    }
  } catch(e) { addLog('err','spotify hatası: '+e.message); }
}

// Spotify OAuth (implicit grant)
function startSpotifyAuth() {
  const scope = 'user-modify-playback-state user-read-playback-state';
  const redir = encodeURIComponent(location.origin + location.pathname);
  location.href = `https://accounts.spotify.com/authorize?client_id=${SPOTIFY_ID}&response_type=token&redirect_uri=${redir}&scope=${encodeURIComponent(scope)}`;
}

function handleSpotifyCallback() {
  const p = new URLSearchParams(location.hash.replace('#','?'));
  const tok = p.get('access_token');
  if (tok) { spotifyToken=tok; location.hash=''; addLog('sys','spotify bağlandı ✓'); }
  else addLog('sys','spotify: bağlı değil');
}

// Reminder
function doReminder(msg, min) {
  addLog('action',`hatırlatıcı: "${msg}" — ${min} dk sonra`);
  Notification.requestPermission();
  setTimeout(()=>{
    addLog('sys',`⏰ ${msg}`);
    speak(msg);
    if (Notification.permission==='granted') new Notification('C.I.R.A.N.',{body:msg});
  }, min*60*1000);
}

// Web search via Gemini grounding
async function doSearch(query) {
  addLog('action',`aranıyor: "${query}"`);
  try {
    const r = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{role:'user',parts:[{text:`Şu konuda kısaca bilgi ver: ${query}`}]}],
          tools:[{googleSearch:{}}]
        })
      }
    );
    const d = await r.json();
    const txt = d.candidates?.[0]?.content?.parts?.find(p=>p.text)?.text;
    if (txt) { addLog('ai',txt,'arama'); speak(txt); }
    else addLog('err','arama sonucu alınamadı');
  } catch(e) { addLog('err','arama hatası: '+e.message); }
}

// ── TTS ───────────────────────────────────────────────────
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang='tr-TR'; u.rate=1.1;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

let recog = null;
const micBtn = document.getElementById('micbtn');

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recog = new SR();
  recog.lang='tr-TR'; recog.continuous=false; recog.interimResults=false;

  recog.onresult = e => { askAI(e.results[0][0].transcript); };
  recog.onend    = () => { micBtn.classList.remove('listening'); micBtn.textContent='mic'; };
  recog.onerror  = e => { micBtn.classList.remove('listening'); micBtn.textContent='mic'; if(e.error!=='no-speech') addLog('err','mikrofon: '+e.error); };

  micBtn.addEventListener('click', ()=>{
    if (!models) { addLog('err','önce sistemi başlat'); return; }
    if (micBtn.classList.contains('listening')) { recog.stop(); }
    else { recog.start(); micBtn.classList.add('listening'); micBtn.textContent='dinliyor'; }

}

function dr(id, label, val, thr, pass) {
  const el = document.getElementById(id); if(!el) return;
  const c = pass ? '#aaa' : '#555';
  el.innerHTML = `<span style="color:#444">${label}:</span> <span style="color:${c}">${val} ${pass?'✓':'✗'}</span> <span style="color:#2e2e2e">${thr}</span>`;
}

function updateDbg(lm, all) {
  if (!lm) {
    document.getElementById('d-fingers').innerHTML='<span style="color:#333">el yok</span>';
    ['d-ok','d-shaka','d-cross','d-down','d-snap','d-heart'].forEach(id=>{
      const e=document.getElementById(id); if(e) e.innerHTML='';
    });
    return;
  }
  const [T,I,M,R,P] = fStates(lm);
  document.getElementById('d-fingers').innerHTML =
    [['T',T],['I',I],['M',M],['R',R],['P',P]].map(([n,v])=>`<span style="color:${v?'#aaa':'#444'}">${n}:${v}</span>`).join(' ');

  const dOK=d2(lm[4],lm[8]), dST=d2(lm[4],lm[8]), dSR=d2(lm[2],lm[5]);
  const xC=segX(lm[5],lm[8],lm[9],lm[12]), yD=lm[8].y-lm[5].y;

  dr('d-ok',    '👌 d(T-I)',   dOK.toFixed(3),  '<0.07',          dOK<0.07);
  dr('d-shaka', '🤙 T+P',     `${T}${I}${M}${R}${P}`,'10001',    T&&!I&&!M&&!R&&P);
  dr('d-cross', '🤞 kesişim', xC?'VAR':'YOK',  'VAR',            xC);
  dr('d-down',  '👇 y offset',yD.toFixed(3),   '>0.04',          yD>0.04);
  dr('d-snap',  '🫰 t/r',     `${dST.toFixed(3)}/${dSR.toFixed(3)}`,'<.05/>.065', dST<0.05&&dSR>0.065);

  if (all.length===2) {
    const o=all.find(l=>l!==lm);
    if(o){ const td=d2(lm[4],o[4]),wd=d2(lm[0],o[0]); dr('d-heart','🫶 t/w',`${td.toFixed(2)}/${wd.toFixed(2)}`,'t<.22,w>t*1.5',td<0.22&&wd>td*1.5); }
  } else document.getElementById('d-heart').innerHTML='<span style="color:#2e2e2e">🫶 tek el</span>';
}

// ── Drawing ───────────────────────────────────────────────
const HCONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
const FOVAL=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];

function drawHand(lm) {
  ctx.strokeStyle='rgba(160,160,160,0.35)'; ctx.lineWidth=1.5;
  HCONN.forEach(([a,b])=>{ ctx.beginPath(); ctx.moveTo(lm[a].x,lm[a].y); ctx.lineTo(lm[b].x,lm[b].y); ctx.stroke(); });
  lm.forEach((p,i)=>{
    const tip=[4,8,12,16,20].includes(i);
    ctx.beginPath(); ctx.arc(p.x,p.y,tip?5:2.5,0,Math.PI*2);
    ctx.fillStyle = tip ? 'rgba(210,210,210,0.85)' : 'rgba(130,130,130,0.55)';
    ctx.fill();
  });
}

function drawFace(lm, dw, dh, dx, dy) {
  ctx.strokeStyle='rgba(100,100,100,0.18)'; ctx.lineWidth=1;
  ctx.beginPath();
  FOVAL.forEach((idx,i)=>{ const l=lm[idx],x=l.x*dw+dx,y=l.y*dh+dy; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.closePath(); ctx.stroke();
}

// ── Gesture detection ─────────────────────────────────────
function fStates(lm) {
  const w=lm[0];
  return [
    Math.abs(lm[4].x-w.x)>Math.abs(lm[2].x-w.x)?1:0,
    lm[8].y<lm[6].y?1:0, lm[12].y<lm[10].y?1:0,
    lm[16].y<lm[14].y?1:0, lm[20].y<lm[18].y?1:0
  ];
}

function d2(a,b) { return Math.hypot(a.x-b.x,a.y-b.y); }

function segX(p1,p2,p3,p4) {
  const cx=(a,b,c)=>(b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x);
  const d1=cx(p3,p4,p1),d2=cx(p3,p4,p2),d3=cx(p1,p2,p3),d4=cx(p1,p2,p4);
  return ((d1>0&&d2<0)||(d1<0&&d2>0))&&((d3>0&&d4<0)||(d3<0&&d4>0));
}

function customGest(lm, all) {
  const [T,I,M,R,P] = fStates(lm);
  if (d2(lm[4],lm[8])<0.07&&M&&R&&P) return 'OK';
  if (T&&!I&&!M&&!R&&P) return 'Shaka';
  if (I&&M&&!R&&!P&&segX(lm[5],lm[8],lm[9],lm[12])) return 'Crossed';
  if (!T&&I&&!M&&!R&&!P&&lm[8].y>lm[5].y+0.04) return 'PointDown';
  if (d2(lm[4],lm[8])<0.05&&d2(lm[2],lm[5])>0.065) return 'FingerSnap';
  if (!T&&!I&&M&&!R&&!P) return 'MiddleFinger';
  if (all.length===2) {
    const o=all.find(l=>l!==lm);
    if(o){ const [oT]=fStates(o),td=d2(lm[4],o[4]),wd=d2(lm[0],o[0]); if(T&&oT&&td<0.22&&wd>td*1.5) return 'HeartHands'; }
  }
  return null;
}

function detectFace(fRes) {
  if (!fRes.faceBlendshapes?.length) return null;
  const s={};
  fRes.faceBlendshapes[0].categories.forEach(c=>{ s[c.categoryName]=c.score; });
  const g=n=>s[n]||0;
  const smile=(g('mouthSmileLeft')+g('mouthSmileRight'))/2;
  const jaw=g('jawOpen'),bd=(g('browDownLeft')+g('browDownRight'))/2;
  const bu=g('browInnerUp'),bL=g('eyeBlinkLeft'),bR=g('eyeBlinkRight');
  const fr=(g('mouthFrownLeft')+g('mouthFrownRight'))/2;
  if((bL>0.6&&bR<0.35)||(bR>0.6&&bL<0.35)) return {key:'wink',conf:Math.max(bL,bR)};
  if(jaw>0.4&&bu>0.3) return {key:'surprise',conf:(jaw+bu)/2};
  if(bd>0.35) return {key:'angry',conf:bd};
  if(fr>0.25&&smile<0.2) return {key:'sad',conf:fr};
  if(smile>0.3) return {key:'smile',conf:smile};
  return {key:'neutral',conf:0.5};
}

function countFin(lm) {
  const w=lm[0]; let c=0;
  if(Math.abs(lm[4].x-w.x)>Math.abs(lm[2].x-w.x)) c++;
  [[8,6],[12,10],[16,14],[20,18]].forEach(([t,b])=>{ if(lm[t].y<lm[b].y) c++; });
  return c;
}
