<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GESTURE//SYS</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00ff88;
      --green-dim: #00ff8844;
      --red: #ff3366;
      --blue: #00aaff;
      --bg: #040a06;
      --surface: #080f09;
      --border: #00ff8833;
      --text: #c8ffd8;
      --text-dim: #4a8a5a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 14px;
      color: var(--green);
      letter-spacing: 3px;
    }

    .logo span { color: var(--text-dim); font-weight: 400; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-dot.active { background: var(--green); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .camera-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }

    .corner {
      position: absolute;
      width: 24px; height: 24px;
      z-index: 10;
      pointer-events: none;
    }
    .corner.tl { top: 12px; left: 12px; border-top: 2px solid var(--green); border-left: 2px solid var(--green); }
    .corner.tr { top: 12px; right: 12px; border-top: 2px solid var(--green); border-right: 2px solid var(--green); }
    .corner.bl { bottom: 12px; left: 12px; border-bottom: 2px solid var(--green); border-left: 2px solid var(--green); }
    .corner.br { bottom: 12px; right: 12px; border-bottom: 2px solid var(--green); border-right: 2px solid var(--green); }

    .start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 20;
      background: var(--bg);
    }

    .start-icon {
      font-size: 64px;
      filter: grayscale(1) brightness(0.4);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .start-title {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      color: var(--green);
      letter-spacing: 4px;
      text-align: center;
    }

    .start-sub {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-align: center;
    }

    .start-btn {
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    .start-btn:active { background: var(--green-dim); }

    .loading-text {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      display: none;
    }

    .loading-bar {
      width: 200px;
      height: 2px;
      background: var(--border);
      display: none;
      overflow: hidden;
    }

    .loading-bar-inner {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 0.3s;
    }

    .panel {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: grid;
      grid-template-columns: 2fr 2fr 1fr 1fr;
      gap: 6px 12px;
    }

    .panel-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .panel-label {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    .panel-value {
      font-size: 13px;
      color: var(--green);
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-value.face { color: var(--blue); }
    .panel-value.none { color: var(--text-dim); }

    .confidence-bar {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }

    .confidence-fill {
      height: 100%;
      background: var(--green);
      width: 0%;
      transition: width 0.15s ease;
    }

    .confidence-fill.face { background: var(--blue); }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">GESTURE<span>//</span>SYS</div>
    <div class="header-right">
      <span id="fps-counter">-- FPS</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </header>

  <div class="camera-wrap" id="camera-wrap">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>

    <div class="start-screen" id="start-screen">
      <div class="start-icon">🖐</div>
      <div class="start-title">GESTURE//SYS</div>
      <div class="start-sub">EL + YÜZ TANIMA</div>
      <button class="start-btn" id="start-btn">BAŞLAT</button>
      <div class="loading-text" id="loading-text">MODEL YÜKLENİYOR...</div>
      <div class="loading-bar" id="loading-bar">
        <div class="loading-bar-inner" id="loading-fill"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-item">
      <div class="panel-label">GESTURE</div>
      <div class="panel-value none" id="panel-gesture">—</div>
      <div class="confidence-bar"><div class="confidence-fill" id="conf-fill"></div></div>
    </div>
    <div class="panel-item">
      <div class="panel-label">YÜZ İFADESİ</div>
      <div class="panel-value face none" id="panel-face">—</div>
      <div class="confidence-bar"><div class="confidence-fill face" id="face-fill"></div></div>
    </div>
    <div class="panel-item">
      <div class="panel-label">PARMAK</div>
      <div class="panel-value none" id="panel-fingers">—</div>
    </div>
    <div class="panel-item">
      <div class="panel-label">EL</div>
      <div class="panel-value none" id="panel-hands">—</div>
    </div>
  </div>

<script type="module">
import {
  GestureRecognizer,
  FaceLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

const GESTURE_LABELS = {
  "None":        { label: "YOK",          emoji: "" },
  "Closed_Fist": { label: "YUMRUK",       emoji: "✊" },
  "Open_Palm":   { label: "AÇIK EL",      emoji: "🖐" },
  "Pointing_Up": { label: "YUKARI",       emoji: "☝️" },
  "Thumb_Down":  { label: "BAŞP. AŞAĞI",  emoji: "👎" },
  "Thumb_Up":    { label: "BAŞP. YUKARI", emoji: "👍" },
  "Victory":     { label: "ZAFER",        emoji: "✌️" },
  "ILoveYou":    { label: "ILY",          emoji: "🤟" },
  "OK":          { label: "TAMAM",        emoji: "👌" },
  "Shaka":       { label: "SHAKA",        emoji: "🤙" },
  "Crossed":     { label: "NAZAR",        emoji: "🤞" },
  "PointDown":   { label: "AŞAĞI",        emoji: "👇" },
  "FingerSnap":  { label: "SNAP",         emoji: "🫰" },
  "HeartHands":  { label: "KALP EL",      emoji: "🫶" },
};

const FACE_LABELS = {
  "smile":    { label: "GÜLÜMSEME", emoji: "😊" },
  "surprise": { label: "ŞAŞKIN",   emoji: "😮" },
  "angry":    { label: "KIZGIN",   emoji: "😠" },
  "sad":      { label: "ÜZGÜN",    emoji: "😞" },
  "wink":     { label: "GÖZ KIRP", emoji: "😉" },
  "neutral":  { label: "NÖTR",     emoji: "😐" },
};

let gestureRecognizer, faceLandmarker;
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let lastVideoTime = -1;
let fpsHistory = [], lastFrameTime = 0;

async function init() {
  const btn         = document.getElementById('start-btn');
  const loadingText = document.getElementById('loading-text');
  const loadingBar  = document.getElementById('loading-bar');
  const loadingFill = document.getElementById('loading-fill');

  btn.style.display = 'none';
  loadingText.style.display = 'block';
  loadingBar.style.display  = 'block';

  let progress = 0;
  const progressInterval = setInterval(() => {
    progress = Math.min(progress + Math.random() * 10, 88);
    loadingFill.style.width = progress + '%';
  }, 300);

  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
    );

    [gestureRecognizer, faceLandmarker] = await Promise.all([
      GestureRecognizer.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 2,
      }),
      FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numFaces: 1,
        outputFaceBlendshapes: true,
      })
    ]);

    clearInterval(progressInterval);
    loadingFill.style.width = '100%';
    await startCamera();
    setTimeout(() => {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('status-dot').classList.add('active');
    }, 300);

  } catch (err) {
    clearInterval(progressInterval);
    loadingText.textContent = 'HATA: ' + err.message;
    loadingText.style.color = 'var(--red)';
    btn.style.display = 'block';
    btn.textContent = 'TEKRAR DENE';
    btn.style.borderColor = 'var(--red)';
    btn.style.color = 'var(--red)';
  }
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  video.play();
  resizeCanvas();
  loop();
}

function resizeCanvas() {
  const wrap = document.getElementById('camera-wrap');
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);

function loop() {
  requestAnimationFrame(loop);
  if (!video.videoWidth || video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;

  const now = performance.now();
  if (lastFrameTime) {
    fpsHistory.push(1000 / (now - lastFrameTime));
    if (fpsHistory.length > 10) fpsHistory.shift();
    document.getElementById('fps-counter').textContent =
      Math.round(fpsHistory.reduce((a, b) => a + b) / fpsHistory.length) + ' FPS';
  }
  lastFrameTime = now;

  const gestureResults = gestureRecognizer.recognizeForVideo(video, now);
  const faceResults    = faceLandmarker.detectForVideo(video, now);

  const vw = video.videoWidth, vh = video.videoHeight;
  const cw = canvas.width,     ch = canvas.height;
  const scale = Math.max(cw / vw, ch / vh);
  const dw = vw * scale, dh = vh * scale;
  const dx = (cw - dw) / 2, dy = (ch - dh) / 2;

  ctx.clearRect(0, 0, cw, ch);

  if (faceResults.faceLandmarks?.length > 0) {
    drawFaceOval(faceResults.faceLandmarks[0], dw, dh, dx, dy);
  }

  let topGesture = 'None', topConf = 0;
  let handCount = 0, totalFingers = 0;

  if (gestureResults.landmarks?.length > 0) {
    handCount = gestureResults.landmarks.length;

    gestureResults.landmarks.forEach((lm, i) => {
      const scaled = lm.map(p => ({
        x: p.x * dw + dx,
        y: p.y * dh + dy,
        z: p.z
      }));
      drawHand(scaled);
      totalFingers += countFingers(lm);

      let gestName = 'None', gestConf = 0;
      if (gestureResults.gestures[i]?.[0]) {
        gestName = gestureResults.gestures[i][0].categoryName;
        gestConf = gestureResults.gestures[i][0].score;
      }

      const custom = detectCustomGesture(lm, gestureResults.landmarks);
      if (custom) { gestName = custom; gestConf = 0.92; }

      if (gestConf > topConf) { topConf = gestConf; topGesture = gestName; }
    });
  }

  const faceExpr = detectFaceExpression(faceResults);
  updatePanel(topGesture, topConf, totalFingers, handCount, faceExpr);
}

// ─── Custom gestures ──────────────────────────────────────
function fingerStates(lm) {
  const wrist = lm[0];
  const thumbExtended = Math.abs(lm[4].x - wrist.x) > Math.abs(lm[2].x - wrist.x) + 0.02;
  return [
    thumbExtended ? 1 : 0,
    lm[8].y  < lm[6].y  ? 1 : 0,
    lm[12].y < lm[10].y ? 1 : 0,
    lm[16].y < lm[14].y ? 1 : 0,
    lm[20].y < lm[18].y ? 1 : 0,
  ];
}

function dist2D(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function detectCustomGesture(lm, allLandmarks) {
  const [thumb, index, middle, ring, pinky] = fingerStates(lm);

  // 👌 OK
  if (dist2D(lm[4], lm[8]) < 0.07 && middle && ring && pinky) return 'OK';

  // 🤙 Shaka
  if (thumb && !index && !middle && !ring && pinky) return 'Shaka';

  // 🤞 Crossed fingers
  if (!thumb && index && middle && !ring && !pinky &&
      Math.abs(lm[8].x - lm[12].x) < 0.045) return 'Crossed';

  // 👇 Pointing down
  if (!thumb && index && !middle && !ring && !pinky &&
      lm[8].y > lm[5].y + 0.04) return 'PointDown';

  // 🫰 Finger snap (thumb near middle, index up)
  if (dist2D(lm[4], lm[12]) < 0.07 && index && !ring && !pinky) return 'FingerSnap';

  // 🫶 Heart hands (two hands, thumbs close together)
  if (allLandmarks.length === 2) {
    const other = allLandmarks.find(l => l !== lm);
    if (other) {
      const fo = fingerStates(other);
      const tipsClose = dist2D(lm[4], other[4]) < 0.22 && dist2D(lm[8], other[8]) < 0.22;
      if (thumb && fo[0] && tipsClose) return 'HeartHands';
    }
  }

  return null;
}

// ─── Face expression ──────────────────────────────────────
function detectFaceExpression(faceResults) {
  if (!faceResults.faceBlendshapes?.length) return null;

  const shapes = {};
  faceResults.faceBlendshapes[0].categories.forEach(c => {
    shapes[c.categoryName] = c.score;
  });

  const get = n => shapes[n] || 0;
  const smile    = (get('mouthSmileLeft') + get('mouthSmileRight')) / 2;
  const jawOpen  = get('jawOpen');
  const browDown = (get('browDownLeft') + get('browDownRight')) / 2;
  const browUp   = get('browInnerUp');
  const blinkL   = get('eyeBlinkLeft');
  const blinkR   = get('eyeBlinkRight');
  const frown    = (get('mouthFrownLeft') + get('mouthFrownRight')) / 2;

  if ((blinkL > 0.6 && blinkR < 0.35) || (blinkR > 0.6 && blinkL < 0.35))
    return { key: 'wink',     conf: Math.max(blinkL, blinkR) };
  if (jawOpen > 0.4 && browUp > 0.3)
    return { key: 'surprise', conf: (jawOpen + browUp) / 2 };
  if (browDown > 0.35)
    return { key: 'angry',    conf: browDown };
  if (frown > 0.25 && smile < 0.2)
    return { key: 'sad',      conf: frown };
  if (smile > 0.3)
    return { key: 'smile',    conf: smile };

  return { key: 'neutral', conf: 0.5 };
}

// ─── Drawing ──────────────────────────────────────────────
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];

function drawHand(lm) {
  ctx.strokeStyle = '#00ff8866';
  ctx.lineWidth = 2;
  HAND_CONNECTIONS.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(lm[a].x, lm[a].y);
    ctx.lineTo(lm[b].x, lm[b].y);
    ctx.stroke();
  });
  lm.forEach((p, i) => {
    const isTip = [4, 8, 12, 16, 20].includes(i);
    ctx.beginPath();
    ctx.arc(p.x, p.y, isTip ? 6 : 3, 0, Math.PI * 2);
    ctx.fillStyle = isTip ? '#00ff88' : '#00ff8899';
    ctx.fill();
  });
}

const FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,
  397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,
  234,127,162,21,54,103,67,109];

function drawFaceOval(landmarks, dw, dh, dx, dy) {
  ctx.strokeStyle = '#00aaff2a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  FACE_OVAL.forEach((idx, i) => {
    const lm = landmarks[idx];
    const x = lm.x * dw + dx, y = lm.y * dh + dy;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.stroke();
}

// ─── Panel ────────────────────────────────────────────────
function countFingers(lm) {
  const wrist = lm[0];
  let count = 0;
  if (Math.abs(lm[4].x - wrist.x) > Math.abs(lm[2].x - wrist.x)) count++;
  [[8,6],[12,10],[16,14],[20,18]].forEach(([t, b]) => {
    if (lm[t].y < lm[b].y) count++;
  });
  return count;
}

function updatePanel(gesture, confidence, fingers, hands, faceExpr) {
  const noHands = hands === 0;
  const gInfo = GESTURE_LABELS[gesture] || { label: gesture, emoji: '' };

  const gEl = document.getElementById('panel-gesture');
  gEl.textContent = noHands ? '—' : (gInfo.emoji ? gInfo.emoji + ' ' + gInfo.label : gInfo.label);
  gEl.className = 'panel-value' + (noHands || gesture === 'None' ? ' none' : '');

  document.getElementById('conf-fill').style.width =
    noHands ? '0%' : Math.round(confidence * 100) + '%';

  const fingEl = document.getElementById('panel-fingers');
  fingEl.textContent = noHands ? '—' : fingers;
  fingEl.className = 'panel-value' + (noHands ? ' none' : '');

  const handEl = document.getElementById('panel-hands');
  handEl.textContent = noHands ? '—' : hands;
  handEl.className = 'panel-value' + (noHands ? ' none' : '');

  const faceEl   = document.getElementById('panel-face');
  const faceFill = document.getElementById('face-fill');
  if (faceExpr) {
    const fi = FACE_LABELS[faceExpr.key];
    faceEl.textContent = fi.emoji + ' ' + fi.label;
    faceEl.className = 'panel-value face' + (faceExpr.key === 'neutral' ? ' none' : '');
    faceFill.style.width = Math.round(faceExpr.conf * 100) + '%';
  } else {
    faceEl.textContent = '—';
    faceEl.className = 'panel-value face none';
    faceFill.style.width = '0%';
  }
}

document.getElementById('start-btn').addEventListener('click', init);
</script>

</body>
</html>
